<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Perros - Lyra v6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      text-align: center;
    }
    .container {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    h2 {
      color: #2e7d32;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 10px;
      margin-top: 0;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    button {
      padding: 12px 20px;
      margin: 5px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1b5e20;
    }
    button.danger {
      background: #c62828;
    }
    button.danger:hover {
      background: #b71c1c;
    }
    button.secondary {
      background: #1565c0;
    }
    button.secondary:hover {
      background: #0d47a1;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    #resultado {
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #e3f2fd;
      color: #0d47a1;
      border: 1px solid #90caf9;
    }
    .perro-card {
      background: #f1f8e9;
      border: 1px solid #c5e1a5;
      padding: 15px;
      border-radius: 6px;
      margin: 10px 0;
    }
    .perro-card h3 {
      margin: 0 0 10px 0;
      color: #33691e;
    }
    .perro-card p {
      margin: 5px 0;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .stat-box {
      background: #fff3e0;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #ffcc80;
    }
    .stat-box .numero {
      font-size: 24px;
      font-weight: bold;
      color: #e65100;
    }
    .stat-box .label {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>🐕 Test Perros - Lyra v6</h1>

  <div class="container">
    <h2>➕ Crear Nuevo Perro</h2>
    <div class="grid-2">
      <input type="text" id="pNombre" placeholder="Nombre del perro *">
      <input type="text" id="pRaza" placeholder="Raza">
      <input type="number" id="pEdad" placeholder="Edad (años)">
      <input type="number" id="pPeso" placeholder="Peso (kg)">
      <select id="pSexo">
        <option value="Macho">Macho</option>
        <option value="Hembra">Hembra</option>
      </select>
      <input type="text" id="pColor" placeholder="Color">
      <input type="text" id="pChip" placeholder="Número de chip">
      <input type="text" id="pPropietario" placeholder="Nombre del propietario">
      <input type="text" id="pTelefono" placeholder="Teléfono propietario">
      <input type="email" id="pEmail" placeholder="Email propietario">
    </div>
    <textarea id="pObservaciones" placeholder="Observaciones"></textarea>
    <textarea id="pAlergias" placeholder="Alergias"></textarea>
    <textarea id="pMedicacion" placeholder="Medicación"></textarea>
    <button onclick="testCrearPerro()">Crear Perro</button>
  </div>

  <div class="container">
    <h2>📋 Lista de Perros</h2>
    <button onclick="testObtenerPerros()">Cargar Todos</button>
    <button class="secondary" onclick="testEstadisticas()">Ver Estadísticas</button>
    <input type="text" id="buscarTermino" placeholder="Buscar por nombre, raza, propietario o chip">
    <button class="secondary" onclick="testBuscar()">Buscar</button>
    <div id="listaPerros"></div>
  </div>

  <div id="resultado">Esperando acciones...</div>

  <script type="module">
    import { 
      initAuthListener, 
      loginUser 
    } from './js/auth.js';
    import { 
      crearPerro, 
      obtenerPerros, 
      obtenerPerro,
      actualizarPerro, 
      eliminarPerro,
      buscarPerros,
      obtenerEstadisticasPerros
    } from './js/perros.js';

    // Auto-login para pruebas (cambia estos datos por los tuyos)
    const TEST_EMAIL = 'elantkan@gmail.com';
    const TEST_PASSWORD = 'elantkan2025';

    function mostrarResultado(mensaje, tipo = 'info') {
      const resultado = document.getElementById('resultado');
      resultado.textContent = mensaje;
      resultado.style.background = tipo === 'error' ? '#ffebee' : tipo === 'success' ? '#e8f5e9' : '#e3f2fd';
      resultado.style.color = tipo === 'error' ? '#c62828' : tipo === 'success' ? '#2e7d32' : '#0d47a1';
    }

    function mostrarPerros(perros) {
      const contenedor = document.getElementById('listaPerros');
      if (!perros || perros.length === 0) {
        contenedor.innerHTML = '<p>No hay perros registrados</p>';
        return;
      }

      contenedor.innerHTML = perros.map(p => `
        <div class="perro-card">
          <h3>${p.nombre} ${p.foto ? '📷' : ''} ${p.activo === false ? '(eliminado)' : ''}</h3>
          <p><strong>Raza:</strong> ${p.raza || 'N/A'} | <strong>Sexo:</strong> ${p.sexo || 'N/A'} | <strong>Edad:</strong> ${p.edad || 0} años | <strong>Peso:</strong> ${p.peso || 0} kg</p>
          <p><strong>Chip:</strong> ${p.chip || 'Sin chip'} | <strong>Color:</strong> ${p.color || 'N/A'}</p>
          <p><strong>Propietario:</strong> ${p.propietario || 'N/A'} | <strong>Tel:</strong> ${p.telefonoPropietario || 'N/A'}</p>
          ${p.alergias ? `<p><strong>⚠️ Alergias:</strong> ${p.alergias}</p>` : ''}
          ${p.medicacion ? `<p><strong>💊 Medicación:</strong> ${p.medicacion}</p>` : ''}
          ${p.observaciones ? `<p><strong>📝 Observaciones:</strong> ${p.observaciones}</p>` : ''}
          <p><strong>ID:</strong> ${p.id}</p>
          <button onclick="testActualizar('${p.id}')">Editar</button>
          <button class="danger" onclick="testEliminar('${p.id}')">Eliminar</button>
        </div>
      `).join('');
    }

    // Auto-login al cargar
    initAuthListener(async (isAuth, user) => {
      if (!isAuth) {
        mostrarResultado('Iniciando sesión automáticamente...', 'info');
        const result = await loginUser(TEST_EMAIL, TEST_PASSWORD);
        if (!result.success) {
          mostrarResultado(`Error de login: ${result.error}`, 'error');
        }
      } else {
        mostrarResultado(`✅ Conectado como ${user.email}`, 'success');
      }
    });

    window.testCrearPerro = async function() {
      const data = {
        nombre: document.getElementById('pNombre').value,
        raza: document.getElementById('pRaza').value,
        edad: parseInt(document.getElementById('pEdad').value) || 0,
        peso: parseFloat(document.getElementById('pPeso').value) || 0,
        sexo: document.getElementById('pSexo').value,
        color: document.getElementById('pColor').value,
        chip: document.getElementById('pChip').value,
        propietario: document.getElementById('pPropietario').value,
        telefonoPropietario: document.getElementById('pTelefono').value,
        emailPropietario: document.getElementById('pEmail').value,
        observaciones: document.getElementById('pObservaciones').value,
        alergias: document.getElementById('pAlergias').value,
        medicacion: document.getElementById('pMedicacion').value
      };

      mostrarResultado('⏳ Creando perro...', 'info');
      const result = await crearPerro(data);

      if (result.success) {
        mostrarResultado(`✅ ${result.message}\n\nID: ${result.id}`, 'success');
        // Limpiar formulario
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testObtenerPerros = async function() {
      mostrarResultado(' Cargando perros...', 'info');
      const result = await obtenerPerros();

      if (result.success) {
        mostrarResultado(`✅ ${result.total} perro(s) encontrado(s)`, 'success');
        mostrarPerros(result.perros);
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testBuscar = async function() {
      const termino = document.getElementById('buscarTermino').value;
      if (!termino) {
        mostrarResultado('⚠️ Escribe un término de búsqueda', 'error');
        return;
      }

      mostrarResultado(`⏳ Buscando "${termino}"...`, 'info');
      const result = await buscarPerros(termino);

      if (result.success) {
        mostrarResultado(`✅ ${result.total} resultado(s) para "${termino}"`, 'success');
        mostrarPerros(result.perros);
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testEstadisticas = async function() {
      mostrarResultado('⏳ Calculando estadísticas...', 'info');
      const result = await obtenerEstadisticasPerros();

      if (result.success) {
        const e = result.estadisticas;
        mostrarResultado(
          ` Estadísticas:\n\n` +
          `Total perros: ${e.total}\n` +
          `Machos: ${e.machos}\n` +
          `Hembras: ${e.hembras}\n` +
          `Con chip: ${e.conChip}\n` +
          `Con foto: ${e.conFoto}\n\n` +
          `Por raza:\n${JSON.stringify(e.porRaza, null, 2)}`,
          'success'
        );
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testActualizar = async function(id) {
      const nuevoNombre = prompt('Nuevo nombre del perro:');
      if (!nuevoNombre) return;

      mostrarResultado(' Actualizando perro...', 'info');
      const result = await actualizarPerro(id, { nombre: nuevoNombre });

      if (result.success) {
        mostrarResultado(`✅ ${result.message}`, 'success');
        testObtenerPerros();
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testEliminar = async function(id) {
      if (!confirm('¿Eliminar este perro? (se marcará como inactivo)')) return;

      mostrarResultado('⏳ Eliminando perro...', 'info');
      const result = await eliminarPerro(id);

      if (result.success) {
        mostrarResultado(`✅ ${result.message}`, 'success');
        testObtenerPerros();
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };
  </script>
</body>
</html>
