<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Perros - Lyra v6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      text-align: center;
    }
    .container {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    h2 {
      color: #2e7d32;
      border-bottom: 2px solid #2e7d32;
      padding-bottom: 10px;
      margin-top: 0;
    }
    h3 {
      color: #475569;
      margin-top: 20px;
      margin-bottom: 15px;
      border-bottom: 1px dashed #e2e8f0;
      padding-bottom: 8px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    button {
      padding: 12px 20px;
      margin: 5px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1b5e20;
    }
    button.danger {
      background: #c62828;
    }
    button.danger:hover {
      background: #b71c1c;
    }
    button.secondary {
      background: #1565c0;
    }
    button.secondary:hover {
      background: #0d47a1;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    #resultado {
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #e3f2fd;
      color: #0d47a1;
      border: 1px solid #90caf9;
    }
    .perro-card {
      background: #f1f8e9;
      border: 1px solid #c5e1a5;
      padding: 15px;
      border-radius: 6px;
      margin: 10px 0;
    }
    .perro-card h3 {
      margin: 0 0 10px 0;
      color: #33691e;
    }
    .perro-card p {
      margin: 5px 0;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .stat-box {
      background: #fff3e0;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #ffcc80;
    }
    .stat-box .numero {
      font-size: 24px;
      font-weight: bold;
      color: #e65100;
    }
    .stat-box .label {
      font-size: 12px;
      color: #666;
    }
    .foto-preview {
      max-width: 150px;
      max-height: 150px;
      border-radius: 8px;
      border: 2px solid #e2e8f0;
      margin: 10px auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>🐕 Test Perros - Lyra v6</h1>

  <div class="container">
    <h2>➕ Crear Nuevo Perro</h2>
    
    <h3>📸 Foto del Perro</h3>
    <img id="fotoPreview" class="foto-preview" style="display:none;" src="" alt="Foto">
    <div>
      <input type="file" id="pFoto" accept="image/*" onchange="previewFoto(this)">
      <button onclick="quitarFoto()">🗑️ Quitar Foto</button>
    </div>

    <h3>📋 Datos Principales</h3>
    <div class="grid-2">
      <input type="text" id="pNombrePerro" placeholder="Nombre del perro *">
      <input type="text" id="pRaza" placeholder="Raza">
      <input type="date" id="pFechaNacimiento" placeholder="Fecha Nacimiento">
      <input type="text" id="pEdad" placeholder="Edad (auto)" readonly>
      <select id="pSexo">
        <option value="">- Sexo -</option>
        <option value="Macho">Macho</option>
        <option value="Hembra">Hembra</option>
      </select>
      <input type="text" id="pMicrochip" placeholder="Microchip">
      <input type="text" id="pPasaporte" placeholder="Pasaporte">
    </div>

    <h3> Datos del Dueño</h3>
    <div class="grid-2">
      <input type="text" id="pNombreDueno" placeholder="Nombre del dueño *">
      <input type="text" id="pDniDueno" placeholder="DNI Dueño">
      <input type="tel" id="pTelefono" placeholder="Teléfono">
      <input type="email" id="pEmail" placeholder="Email">
      <input type="text" id="pDireccion" placeholder="Dirección" style="grid-column: 1 / -1;">
      <input type="text" id="pVeterinario" placeholder="Veterinario">
    </div>
    <textarea id="pNotas" placeholder="Notas"></textarea>

    <h3>🏥 Salud y Cuidados</h3>
    <div class="grid-2">
      <select id="pEstadoPelo">
        <option value="Bien">✅ Bien</option>
        <option value="Regular">⚠️ Regular</option>
        <option value="Mal">❌ Mal</option>
      </select>
      <select id="pMedicacion">
        <option value="No">No necesita medicación</option>
        <option value="Sí">Sí necesita medicación</option>
      </select>
    </div>
    <textarea id="pDetallesMedicacion" placeholder="Detalles de medicación / curas"></textarea>
    <textarea id="pAlergias" placeholder="Alergias / Intolerancias"></textarea>

    <h3>💰 Tarifa Especial (Opcional)</h3>
    <input type="number" id="pPrecioPersonalizado" step="0.50" placeholder="Precio personalizado (€/día o clase)">

    <button onclick="testCrearPerro()"> Guardar Perro</button>
  </div>

  <div class="container">
    <h2>📋 Lista de Perros</h2>
    <button onclick="testObtenerPerros()">Cargar Todos</button>
    <button class="secondary" onclick="testEstadisticas()">Ver Estadísticas</button>
    <input type="text" id="buscarTermino" placeholder="Buscar por nombre, dueño, microchip o raza">
    <button class="secondary" onclick="testBuscar()">Buscar</button>
    <div id="listaPerros"></div>
  </div>

  <div id="resultado">Esperando acciones...</div>

  <script type="module">
    import { 
      initAuthListener, 
      loginUser 
    } from './js/auth.js';
    import { 
      crearPerro, 
      obtenerPerros, 
      obtenerPerro,
      actualizarPerro, 
      eliminarPerro,
      buscarPerros,
      obtenerEstadisticasPerros,
      calcularEdad
    } from './js/perros.js';

    const TEST_EMAIL = 'elantkan@gmail.com';
    const TEST_PASSWORD = 'elantkan2025';

    let fotoBase64 = null;

    function mostrarResultado(mensaje, tipo = 'info') {
      const resultado = document.getElementById('resultado');
      resultado.textContent = mensaje;
      resultado.style.background = tipo === 'error' ? '#ffebee' : tipo === 'success' ? '#e8f5e9' : '#e3f2fd';
      resultado.style.color = tipo === 'error' ? '#c62828' : tipo === 'success' ? '#2e7d32' : '#0d47a1';
    }

    function mostrarPerros(perros) {
      const contenedor = document.getElementById('listaPerros');
      if (!perros || perros.length === 0) {
        contenedor.innerHTML = '<p>No hay perros registrados</p>';
        return;
      }

      contenedor.innerHTML = perros.map(p => {
        const fotoSrc = p.fotoUrl || p.foto || '';
        const fotoHtml = fotoSrc ? `<img src="${fotoSrc}" style="max-width:100px;max-height:100px;border-radius:8px;">` : '🐕';
        const edad = p.fechaNacimiento ? calcularEdad(p.fechaNacimiento) : (p.edad || 'N/A');
        
        return `
        <div class="perro-card">
          <h3>${fotoHtml} ${p.nombrePerro} ${p.tieneFoto ? '📷' : ''}</h3>
          <p><strong>Raza:</strong> ${p.raza || 'N/A'} | <strong>Sexo:</strong> ${p.sexo || 'N/A'} | <strong>Edad:</strong> ${edad}</p>
          <p><strong>Microchip:</strong> ${p.microchip || 'Sin chip'} | <strong>Pasaporte:</strong> ${p.pasaporte || 'N/A'}</p>
          <p><strong>Dueño:</strong> ${p.nombreDueno} | <strong>DNI:</strong> ${p.dniDueno || 'N/A'}</p>
          <p><strong>Tel:</strong> ${p.telefono || 'N/A'} | <strong>Email:</strong> ${p.email || 'N/A'}</p>
          <p><strong>Dirección:</strong> ${p.direccion || 'N/A'} | <strong>Vet:</strong> ${p.veterinario || 'N/A'}</p>
          ${p.notas ? `<p><strong>📝 Notas:</strong> ${p.notas}</p>` : ''}
          <p><strong>✨ Pelo:</strong> ${p.estadoPelo || 'Bien'} | <strong>💊 Medicación:</strong> ${p.medicacion || 'No'}</p>
          ${p.detallesMedicacion ? `<p><strong>📋 Detalles:</strong> ${p.detallesMedicacion}</p>` : ''}
          ${p.alergias ? `<p><strong>⚠️ Alergias:</strong> ${p.alergias}</p>` : ''}
          ${p.precioPersonalizado ? `<p><strong>💶 Tarifa Especial:</strong> ${p.precioPersonalizado}€</p>` : ''}
          <p><strong>ID:</strong> ${p.id}</p>
          <button onclick="testActualizar('${p.id}')">Editar</button>
          <button class="danger" onclick="testEliminar('${p.id}')">Eliminar</button>
        </div>
      `}).join('');
    }

    window.previewFoto = (input) => {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          fotoBase64 = e.target.result;
          document.getElementById('fotoPreview').src = fotoBase64;
          document.getElementById('fotoPreview').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    };

    window.quitarFoto = () => {
      fotoBase64 = null;
      document.getElementById('fotoPreview').src = '';
      document.getElementById('fotoPreview').style.display = 'none';
      document.getElementById('pFoto').value = '';
    };

    // Auto-login
    initAuthListener(async (isAuth, user) => {
      if (!isAuth) {
        mostrarResultado('Iniciando sesión automáticamente...', 'info');
        const result = await loginUser(TEST_EMAIL, TEST_PASSWORD);
        if (!result.success) {
          mostrarResultado(`Error de login: ${result.error}`, 'error');
        }
      } else {
        mostrarResultado(`✅ Conectado como ${user.email}`, 'success');
      }
    });

    window.testCrearPerro = async function() {
      const data = {
        nombrePerro: document.getElementById('pNombrePerro').value,
        raza: document.getElementById('pRaza').value,
        fechaNacimiento: document.getElementById('pFechaNacimiento').value,
        edad: document.getElementById('pEdad').value,
        sexo: document.getElementById('pSexo').value,
        microchip: document.getElementById('pMicrochip').value,
        pasaporte: document.getElementById('pPasaporte').value,
        nombreDueno: document.getElementById('pNombreDueno').value,
        dniDueno: document.getElementById('pDniDueno').value,
        telefono: document.getElementById('pTelefono').value,
        email: document.getElementById('pEmail').value,
        direccion: document.getElementById('pDireccion').value,
        veterinario: document.getElementById('pVeterinario').value,
        notas: document.getElementById('pNotas').value,
        estadoPelo: document.getElementById('pEstadoPelo').value,
        medicacion: document.getElementById('pMedicacion').value,
        detallesMedicacion: document.getElementById('pDetallesMedicacion').value,
        alergias: document.getElementById('pAlergias').value,
        precioPersonalizado: parseFloat(document.getElementById('pPrecioPersonalizado').value) || 0,
        foto: fotoBase64 || '',
        tieneFoto: fotoBase64 ? true : false
      };

      mostrarResultado(' Creando perro...', 'info');
      const result = await crearPerro(data);

      if (result.success) {
        mostrarResultado(`✅ ${result.message}\n\nID: ${result.id}`, 'success');
        // Limpiar formulario
        document.querySelectorAll('input, textarea, select').forEach(el => {
          if (el.type !== 'file') el.value = '';
        });
        fotoBase64 = null;
        document.getElementById('fotoPreview').style.display = 'none';
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testObtenerPerros = async function() {
      mostrarResultado('⏳ Cargando perros...', 'info');
      const result = await obtenerPerros();

      if (result.success) {
        mostrarResultado(`✅ ${result.total} perro(s) encontrado(s)`, 'success');
        mostrarPerros(result.perros);
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testBuscar = async function() {
      const termino = document.getElementById('buscarTermino').value;
      if (!termino) {
        mostrarResultado('⚠️ Escribe un término de búsqueda', 'error');
        return;
      }

      mostrarResultado(` Buscando "${termino}"...`, 'info');
      const result = await buscarPerros(termino);

      if (result.success) {
        mostrarResultado(`✅ ${result.total} resultado(s) para "${termino}"`, 'success');
        mostrarPerros(result.perros);
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testEstadisticas = async function() {
      mostrarResultado('⏳ Calculando estadísticas...', 'info');
      const result = await obtenerEstadisticasPerros();

      if (result.success) {
        const e = result.estadisticas;
        mostrarResultado(
          `📊 Estadísticas:\n\n` +
          `Total perros: ${e.total}\n` +
          `Machos: ${e.machos}\n` +
          `Hembras: ${e.hembras}\n` +
          `Con microchip: ${e.conMicrochip}\n` +
          `Con foto: ${e.conFoto}\n` +
          `Con medicación: ${e.conMedicacion}\n` +
          `Con alergias: ${e.conAlergias}\n\n` +
          `Por raza:\n${JSON.stringify(e.porRaza, null, 2)}`,
          'success'
        );
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testActualizar = async function(id) {
      const nuevoNombre = prompt('Nuevo nombre del perro:');
      if (!nuevoNombre) return;

      mostrarResultado('⏳ Actualizando perro...', 'info');
      const result = await actualizarPerro(id, { nombrePerro: nuevoNombre });

      if (result.success) {
        mostrarResultado(`✅ ${result.message}`, 'success');
        testObtenerPerros();
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };

    window.testEliminar = async function(id) {
      if (!confirm('¿Eliminar este perro permanentemente?')) return;

      mostrarResultado('⏳ Eliminando perro...', 'info');
      const result = await eliminarPerro(id);

      if (result.success) {
        mostrarResultado(`✅ ${result.message}`, 'success');
        testObtenerPerros();
      } else {
        mostrarResultado(`❌ Error: ${result.error}`, 'error');
      }
    };
  </script>
</body>
</html>
