<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Auth - Lyra v6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
    button.logout {
      background: #f44336;
    }
    button.logout:hover {
      background: #da190b;
    }
    #resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    h2 {
      color: #333;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>🐕 Test Auth - Lyra v6</h1>
  
  <div class="container">
    <h2>Registro de Usuario</h2>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)">
    <input type="text" id="regNombre" placeholder="Nombre completo">
    <input type="text" id="regHotel" placeholder="Nombre del hotel">
    <button onclick="testRegistro()">Registrar Usuario</button>
  </div>

  <div class="container">
    <h2>Login de Usuario</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Contraseña">
    <button onclick="testLogin()">Iniciar Sesión</button>
  </div>

  <div class="container">
    <h2>Acciones</h2>
    <button onclick="testEstado()">Ver Estado Actual</button>
    <button class="logout" onclick="testLogout()">Cerrar Sesión</button>
  </div>

  <div id="resultado" class="info">
    Esperando acciones...
  </div>

  <script type="module">
    import { 
      initAuthListener, 
      loginUser, 
      registerUser, 
      logoutUser, 
      getCurrentUser,
      isAuthenticated 
    } from './js/auth.js';

    // Función para mostrar resultados
    function mostrarResultado(mensaje, tipo = 'info') {
      const resultado = document.getElementById('resultado');
      resultado.textContent = mensaje;
      resultado.className = tipo;
    }

    // Inicializar listener de autenticación
    initAuthListener((isAuthenticated, user) => {
      if (isAuthenticated) {
        mostrarResultado(
          `✅ Usuario autenticado:\n\n` +
          `Email: ${user.email}\n` +
          `Nombre: ${user.displayName || 'N/A'}\n` +
          `UID: ${user.uid}\n\n` +
          `Datos Firestore:\n${JSON.stringify(user.data, null, 2)}`,
          'success'
        );
      } else {
        mostrarResultado('ℹ️ No hay usuario autenticado', 'info');
      }
    });

    // Test de registro
    window.testRegistro = async function() {
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const nombre = document.getElementById('regNombre').value;
      const hotel = document.getElementById('regHotel').value;

      mostrarResultado('⏳ Registrando usuario...', 'info');

      const result = await registerUser(email, password, nombre, hotel);

      if (result.success) {
        mostrarResultado(
          `✅ Registro exitoso:\n\n` +
          `Email: ${result.user.email}\n` +
          `UID: ${result.user.uid}\n` +
          `Mensaje: ${result.message}`,
          'success'
        );
      } else {
        mostrarResultado(`❌ Error en registro:\n\n${result.error}`, 'error');
      }
    };

    // Test de login
    window.testLogin = async function() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      mostrarResultado('⏳ Iniciando sesión...', 'info');

      const result = await loginUser(email, password);

      if (result.success) {
        mostrarResultado(
          `✅ Login exitoso:\n\n` +
          `Email: ${result.user.email}\n` +
          `Nombre: ${result.user.displayName || 'N/A'}\n` +
          `UID: ${result.user.uid}\n` +
          `Mensaje: ${result.message}\n\n` +
          `Datos Firestore:\n${JSON.stringify(result.user.data, null, 2)}`,
          'success'
        );
      } else {
        mostrarResultado(`❌ Error en login:\n\n${result.error}`, 'error');
      }
    };

    // Test de estado actual
    window.testEstado = function() {
      const user = getCurrentUser();
      const isAuth = isAuthenticated();

      if (isAuth && user) {
        mostrarResultado(
          `✅ Estado actual:\n\n` +
          `Autenticado: Sí\n` +
          `Email: ${user.email}\n` +
          `Nombre: ${user.displayName || 'N/A'}\n` +
          `UID: ${user.uid}\n\n` +
          `Datos Firestore:\n${JSON.stringify(user.data, null, 2)}`,
          'success'
        );
      } else {
        mostrarResultado('ℹ️ Estado actual:\n\nAutenticado: No', 'info');
      }
    };

    // Test de logout
    window.testLogout = async function() {
      mostrarResultado('⏳ Cerrando sesión...', 'info');

      const result = await logoutUser();

      if (result.success) {
        mostrarResultado(`✅ ${result.message}`, 'success');
      } else {
        mostrarResultado(`❌ Error:\n\n${result.error}`, 'error');
      }
    };
  </script>
</body>
</html>
