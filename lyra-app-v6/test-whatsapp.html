<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test WhatsApp - Lyra v6</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; text-align: center; }
    .container { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    h2 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; margin-top: 0; }
    h3 { color: #475569; margin-top: 20px; margin-bottom: 15px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
    input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    textarea { resize: vertical; min-height: 100px; }
    button { padding: 12px 20px; margin: 5px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1b5e20; }
    button.danger { background: #c62828; }
    button.secondary { background: #1565c0; }
    button.whatsapp { background: #25D366; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #resultado { padding: 15px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
    .contact-item { transition: all 0.2s; background: white; padding: 15px; margin: 10px 0; border-radius: 6px; border-left: 4px solid #25D366; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #e2e8f0; border-left-width: 4px; }
    .contact-item:hover { background: #f8fafc; }
    .contact-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #2e7d32; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: #25D366; color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .toolbar .count { background: white; color: #25D366; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    .toolbar button { background: white; color: #25D366; }
    .toolbar button:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <h1>💬 Test WhatsApp - Lyra v6</h1>

  <div class="container">
    <h2>📢 Envío Masivo de Mensajes</h2>
    
    <div class="toolbar">
      <div>
        <h4 style="margin: 0; font-weight: 700;">📱 Contactos Seleccionados</h4>
      </div>
      <div class="count" id="selectedCount">0 contactos</div>
    </div>
    
    <div style="margin-bottom: 15px;">
      <button onclick="selectAll(true)">✅ Seleccionar Todos</button>
      <button onclick="selectAll(false)" style="background: rgba(255,255,255,0.2); color: white;">❌ Deseleccionar Todos</button>
    </div>
    
    <textarea id="mensajeMasivo" placeholder="Escribe tu mensaje corporativo aquí..."></textarea>
    
    <button class="whatsapp" onclick="enviarMasivoTest()" style="width: 100%; padding: 15px; font-size: 16px; background: white; color: #128C7E;">📤 ENVIAR A SELECCIONADOS</button>
  </div>

  <div class="container">
    <h2>📋 Lista de Contactos</h2>
    <input type="text" id="buscarContacto" placeholder="🔍 Buscar contacto..." onkeyup="filtrarContactos()">
    <div id="listaContactos" style="max-height: 500px; overflow-y: auto;"></div>
  </div>

  <div class="container">
    <h2>💬 Mensaje Individual</h2>
    <input type="text" id="contactoNombre" readonly placeholder="Selecciona un contacto de la lista">
    <input type="text" id="contactoTelefono" readonly placeholder="Teléfono">
    <textarea id="mensajeIndividual" placeholder="Mensaje personalizado..."></textarea>
    <button class="whatsapp" onclick="enviarIndividualTest()" style="width: 100%;">💬 Enviar Mensaje</button>
  </div>

  <div id="resultado">Esperando acciones...</div>

  <script type="module">
    import { initAuthListener, loginUser } from './js/auth.js';
    import { 
      obtenerContactos, 
      buscarContactos,
      enviarWhatsAppIndividual,
      enviarMasivo,
      obtenerTelefonosDeDuenos
    } from './js/whatsapp.js';

    const TEST_EMAIL = 'elantkan@gmail.com';
    const TEST_PASSWORD = 'elantkan2025';
    
    let contactosGlobales = [];
    let contactosSeleccionados = [];

    function mostrarResultado(msg, tipo = 'info') {
      const res = document.getElementById('resultado');
      res.textContent = msg;
      res.style.background = tipo === 'error' ? '#ffebee' : tipo === 'success' ? '#e8f5e9' : '#e3f2fd';
      res.style.color = tipo === 'error' ? '#c62828' : tipo === 'success' ? '#2e7d32' : '#0d47a1';
    }

    initAuthListener(async (isAuth, user) => {
      if (!isAuth) {
        mostrarResultado('Iniciando sesión...', 'info');
        await loginUser(TEST_EMAIL, TEST_PASSWORD);
      } else {
        mostrarResultado(`✅ Conectado como ${user.email}`, 'success');
        cargarContactos();
      }
    });

    async function cargarContactos() {
      mostrarResultado('⏳ Cargando contactos...', 'info');
      const res = await obtenerContactos();
      
      if (res.success) {
        contactosGlobales = res.contactos;
        mostrarListaContactos(res.contactos);
        mostrarResultado(`✅ ${res.total} contacto(s) cargado(s)`, 'success');
      } else {
        mostrarResultado(`❌ Error: ${res.error}`, 'error');
      }
    }

    function mostrarListaContactos(contactos) {
      const lista = document.getElementById('listaContactos');
      lista.innerHTML = '';
      
      if (contactos.length === 0) {
        lista.innerHTML = '<p style="text-align:center;padding:20px;color:#64748b;">No hay contactos</p>';
        return;
      }
      
      contactos.forEach(contacto => {
        const seleccionado = contactosSeleccionados.includes(contacto.nombre) ? 'checked' : '';
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.innerHTML = `
          <div style="flex: 1;">
            <h4 style="margin: 0 0 5px 0; color: #1e293b;">👤 ${contacto.nombre}</h4>
            <p style="margin: 3px 0; font-size: 13px;">📞 ${contacto.telefono}</p>
            <p style="margin: 3px 0; font-size: 13px;">📧 ${contacto.email || 'Sin email'}</p>
            <p style="margin: 3px 0; font-size: 13px;">🐕 ${contacto.perros.join(', ')}</p>
          </div>
          <input type="checkbox" class="contact-checkbox" data-nombre="${contacto.nombre}" data-telefono="${contacto.telefono}" ${seleccionado} onchange="toggleSeleccion(this)" style="width: 20px; height: 20px; cursor: pointer;">
        `;
        
        div.onclick = (e) => {
          if (e.target.type !== 'checkbox') {
            const checkbox = div.querySelector('.contact-checkbox');
            checkbox.checked = !checkbox.checked;
            toggleSeleccion(checkbox);
          }
        };
        
        lista.appendChild(div);
      });
      
      actualizarContador();
    }

    window.toggleSeleccion = (checkbox) => {
      const nombre = checkbox.dataset.nombre;
      const telefono = checkbox.dataset.telefono;
      
      if (checkbox.checked) {
        if (!contactosSeleccionados.includes(nombre)) {
          contactosSeleccionados.push(nombre);
        }
        document.getElementById('contactoNombre').value = nombre;
        document.getElementById('contactoTelefono').value = telefono;
      } else {
        contactosSeleccionados = contactosSeleccionados.filter(n => n !== nombre);
      }
      
      actualizarContador();
    };

    window.selectAll = (seleccionar) => {
      document.querySelectorAll('.contact-checkbox').forEach(cb => {
        cb.checked = seleccionar;
        toggleSeleccion(cb);
      });
    };

    function actualizarContador() {
      const count = document.getElementById('selectedCount');
      if (count) {
        count.textContent = `${contactosSeleccionados.length} contacto${contactosSeleccionados.length !== 1 ? 's' : ''}`;
      }
    }

    window.filtrarContactos = () => {
      const texto = document.getElementById('buscarContacto').value.toLowerCase();
      document.querySelectorAll('.contact-item').forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(texto) ? 'flex' : 'none';
      });
    };

    window.enviarMasivoTest = async () => {
      const mensaje = document.getElementById('mensajeMasivo').value;
      
      if (!mensaje) {
        mostrarResultado('❌ Escribe un mensaje', 'error');
        return;
      }
      
      if (contactosSeleccionados.length === 0) {
        mostrarResultado('⚠️ Selecciona al menos un contacto', 'error');
        return;
      }
      
      const confirmacion = confirm(`¿Enviar mensaje a ${contactosSeleccionados.length} contacto(s)?`);
      if (!confirmacion) return;
      
      mostrarResultado('⏳ Enviando mensajes...', 'info');
      
      const resTelefonos = await obtenerTelefonosDeDuenos(contactosSeleccionados);
      if (!resTelefonos.success) {
        mostrarResultado(`❌ Error: ${resTelefonos.error}`, 'error');
        return;
      }
      
      const res = await enviarMasivo(resTelefonos.telefonos, mensaje, true);
      
      if (res.success) {
        mostrarResultado(`✅ ${res.mensaje}`, 'success');
      } else {
        mostrarResultado(`❌ Error: ${res.error}`, 'error');
      }
    };

    window.enviarIndividualTest = () => {
      const telefono = document.getElementById('contactoTelefono').value;
      const nombre = document.getElementById('contactoNombre').value;
      const mensaje = document.getElementById('mensajeIndividual').value;
      
      if (!telefono) {
        mostrarResultado('❌ Selecciona un contacto de la lista', 'error');
        return;
      }
      
      if (!mensaje) {
        mostrarResultado('❌ Escribe un mensaje', 'error');
        return;
      }
      
      const res = enviarWhatsAppIndividual(telefono, nombre, mensaje);
      
      if (res.success) {
        mostrarResultado(`✅ ${res.message}`, 'success');
      } else {
        mostrarResultado(`❌ Error: ${res.error}`, 'error');
      }
    };
  </script>
</body>
</html>
